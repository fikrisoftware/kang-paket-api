<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kpFaceL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7882F"/>
      <stop offset="1" stop-color="#EC6B12"/>
    </linearGradient>
    <linearGradient id="kpFaceR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E0670F"/>
      <stop offset="1" stop-color="#C9560A"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="#272c38"/>

  <!-- Tutup kardus terbuka (flap belakang) -->
  <path d="M150 232 L256 174 L238 146 L132 204 Z" fill="#FFA34D"/>
  <path d="M362 232 L256 174 L274 146 L380 204 Z" fill="#FF9536"/>

  <!-- Bagian dalam kotak (mulut terbuka) -->
