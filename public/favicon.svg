  <!-- Dua sisi depan kotak -->
  <path d="M150 232 L256 290 L256 420 L150 362 Z" fill="url(#kpFaceL)"/>
  <path d="M256 290 L362 232 L362 362 L256 420 Z" fill="url(#kpFaceR)"/>

  <!-- Kurung kurawal { } di sisi kiri -->
  <g fill="none" stroke="#fff5ec" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <path d="M205 312 c-12 0 -8 16 -16 22 c8 6 4 22 16 22"/>
    <path d="M233 320 c12 0 8 12 16 16 c-8 4 -4 16 -16 16" transform="translate(0,2)"/>
  </g>

  <!-- Slash / di sisi kanan -->
  <path d="M300 392 L334 330" stroke="#ffd9b8" stroke-width="11" stroke-linecap="round"/>

  <!-- Panah menembak ke atas (request keluar) -->
  <g stroke="#FF8A2A" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M250 268 L386 150"/>
    <path d="M330 150 L392 138 L380 198"/>
  </g>
</svg>
